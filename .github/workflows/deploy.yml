name: Deploy site to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npx tsc --noEmit
      - name: Build (inject app version and size from appcast)
        env:
          # Lets the changelog section fetch GitHub Releases at build with a
          # higher rate limit (the repo is public, so this is read-only).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Version = first <sparkle:version> (newest item is first in the appcast).
          VERSION=$(grep -oE '<sparkle:version>[^<]+' public/appcast.xml | head -1 | sed 's/.*>//')
          [ -n "$VERSION" ] || { echo "ERROR: could not extract version from public/appcast.xml"; exit 1; }
          echo "Building site with app version: $VERSION"
          # Size = length= on the FULL app enclosure (Greyout-macOS.zip) specifically,
          # so a future <sparkle:deltas> entry (which also carries length=) is ignored.
          BYTES=$(grep 'Greyout-macOS.zip' public/appcast.xml | grep -oE 'length="[0-9]+"' | head -1 | grep -oE '[0-9]+')
          [ -n "$BYTES" ] || { echo "ERROR: could not extract size from public/appcast.xml"; exit 1; }
          SIZE=$(awk "BEGIN{printf \"%.1f MB\", $BYTES/1048576}")
          echo "App size: $SIZE"
          NEXT_PUBLIC_APP_VERSION="$VERSION" NEXT_PUBLIC_APP_SIZE="$SIZE" npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Smoke tests (against the built site)
        run: npm run test:e2e
      - uses: actions/upload-pages-artifact@v3
        with: { path: out }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
